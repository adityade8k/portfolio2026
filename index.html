<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aditya De Portfolio Prototype</title>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div class="modal-overlay" data-modal-overlay hidden>
      <section
        class="modal-dialog"
        data-modal-dialog
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
        tabindex="-1"
      >
        <header class="modal-header">
          <h2 id="modal-title" data-modal-title></h2>
          <button class="modal-close" data-modal-close type="button" aria-label="Close modal">CLOSE</button>
        </header>
        <div class="modal-body" data-modal-body></div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
